[supervisord]
nodaemon=true

[program:mongodb]
command=/usr/bin/mongod --bind_ip_all --dbpath /data/db
user=mongodb
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/mongodb.log
stderr_logfile=/var/log/supervisor/mongodb.err

[program:backend]
command=sh -c "sleep 10 && node server.js"
directory=/app/backend
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/backend.log
stderr_logfile=/var/log/supervisor/backend.err
environment=NODE_ENV=production,PORT=5000,MONGODB_URI=mongodb://localhost:27017/sams